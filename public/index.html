<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hidden Echoes - curated music journey.">

    <title>Hidden Echoes</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="siteHeader">
        <div class="container headerLayout">

            <div class="brand">
                <h1>Hidden Echoes</h1>
                <p>Curated Music Journey</p>
            </div>

            <form class="searchForm" role="search">
                <input type="search" class="searchInput" placeholder="Search songs, artists..."
                    aria-label="Search songs and artists">
            </form>

            <button type="button" class="favoritesButton">
                ♡ Favorites
            </button>

        </div>
    </header>

    <main>

        <nav class="genresNav" aria-label="Music Genres">
            <div class="container genresList">
                <button type="button">All</button>
                <button type="button">Rock</button>
                <button type="button">Pop</button>
                <button type="button">Electronic</button>
                <button type="button">Retro</button>
                <button type="button">Movie Themes</button>
                <button type="button">Hidden Gems</button>
                <button type="button">Time Travel</button>
            </div>
        </nav>

        <section class="heroSection">
            <div class="heroContent">
                <p class="eyebrow">Curated Music Journey</p>
                <h2>
                    Discover songs<br>
                    beyond the ordinary.
                </h2>

                <p class="heroDescription">
                    Hidden Echoes is a personal collection of unforgettable music,
                    forgotten classics, cinematic soundtracks, and emotional discoveries.
                </p>

                <button type="button" class="primaryButton">
                    ▶ Explore Collection
                </button>
            </div>
        </section>
        
        <section class="videoSection">
            <div class="container">

                <div class="sectionHeader">
                    <h2>Featured by Hidden Echoes</h2>
                    <a href="#">See all</a>
                </div>

                <div class="videoGrid">
                    <!-- <article class="videoCard">
                        <div class="cardThumbnail"></div>
                        <div class="cardContent">
                            <h3 class="cardTitle">Song Title</h3>
                            <p class="cardArtist">Artist Name</p>
                        </div>
                    </article> -->
                </div>
        </section>
    </main>

    <footer class="siteFooter">
        <div class="container">
            <p>Hidden Echoes © 2026</p>
        </div>
    </footer>

    <script src="js/app.js"></script>

</body>

</html>
